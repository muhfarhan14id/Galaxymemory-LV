<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Memory</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-overlay { position: absolute; top: 15%; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        #ui-overlay h1 { font-size: 2rem; font-weight: 400; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 0, 0, 0.5); margin: 0; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #050510; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s ease; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 0, 0, 0.3); border-top-color: #ff0033; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none; font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); background: rgba(0,0,0,0.5); padding: 10px 0; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Mempersiapkan Kenangan...</div>
    </div>
    <div id="ui-overlay">
        <h1>Only For U, Ayu Anita Purnama</h1>
    </div>
    <div id="instructions">
        Geser untuk memutar | Scroll untuk Zoom in/out | Meload data dari database.json
    </div>
    <div id="canvas-container"></div>

    <!-- 
    ========================================================================
    UNTUK PROYEK LOKAL ANDA:
    Hapus seluruh tag <script> di bawah ini, dan ganti dengan:
    <script type="module" src="/assets/js/system.js"></script>
    ======================================================================== 
    -->
    <script type="module">
        /* ========================================================================
           MULAI KODE UNTUK FILE: /assets/js/system.js
           (Copy semua kode di bawah ini lalu paste ke dalam file system.js Anda)
           ======================================================================== */
        
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // 1. SETUP SCENE & CAMERA
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.003); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;   
        controls.maxDistance = 600; 

        // 2. SETUP GALAKSI (Bintang & Cincin)
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }
        const particleTexture = createParticleTexture();

        // Inti Galaksi Merah
        const coreGeo = new THREE.BufferGeometry();
        const corePos = new Float32Array(8000 * 3);
        for (let i = 0; i < 8000; i++) {
            const u = Math.random(), v = Math.random();
            const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
            const r = 30 * Math.cbrt(Math.random());
            corePos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            corePos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            corePos[i * 3 + 2] = r * Math.cos(phi);
        }
        coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
        const coreMesh = new THREE.Points(coreGeo, new THREE.PointsMaterial({ color: 0xff0033, size: 1.5, map: particleTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
        scene.add(coreMesh);

        // Cincin Galaksi Luar
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = new Float32Array(15000 * 3);
        const ringColors = new Float32Array(15000 * 3);
        for (let i = 0; i < 15000; i++) {
            const radius = 35 + Math.random() * 250;
            const theta = Math.random() * 2 * Math.PI;
            ringPos[i * 3] = radius * Math.cos(theta);
            ringPos[i * 3 + 1] = (Math.random() - 0.5) * (Math.random() * 20);
            ringPos[i * 3 + 2] = radius * Math.sin(theta);
            const mixedColor = Math.random() > 0.7 ? new THREE.Color(0xff3344) : new THREE.Color(0xffffff);
            ringColors[i * 3] = mixedColor.r; ringColors[i * 3 + 1] = mixedColor.g; ringColors[i * 3 + 2] = mixedColor.b;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
        const ringMesh = new THREE.Points(ringGeo, new THREE.PointsMaterial({ size: 1.2, vertexColors: true, map: particleTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
        scene.add(ringMesh);

        // 3. SISTEM LOAD DATA (JSON -> GAMBAR/VIDEO)
        const basePath = '/assets/img/';
        const manager = new THREE.LoadingManager();
        const textureLoader = new THREE.TextureLoader(manager);
        const photoOrbits = []; 

        manager.onLoad = function () {
            const loadingScreen = document.getElementById('loading-screen');
            if(loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);
            }
        };

        function createMediaMesh(texture, index, isVideo = false) {
            if(!isVideo) texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            const imgSize = (isVideo ? 12 : 8) + Math.random() * 4; 
            const imgGeo = new THREE.PlaneGeometry(imgSize, imgSize);
            const imgMesh = new THREE.Mesh(imgGeo, new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide }));

            const frameMesh = new THREE.Mesh(new THREE.PlaneGeometry(imgSize + 0.6, imgSize + 0.6), new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
            frameMesh.position.z = -0.1; 

            const photoGroup = new THREE.Group();
            photoGroup.add(imgMesh); photoGroup.add(frameMesh);

            const radius = 40 + (index * 6) + (Math.random() * 20); 
            const theta = Math.random() * Math.PI * 2; 
            const yPos = (Math.random() - 0.5) * 40; 
            
            photoGroup.position.set(radius * Math.cos(theta), yPos, radius * Math.sin(theta));
            scene.add(photoGroup);

            photoOrbits.push({ mesh: photoGroup, radius: radius, angle: theta, y: yPos, speed: 0.0005 + Math.random() * 0.001 });
        }

        async function initGalaxyFromDatabase() {
            let filesToLoad = [];
            try {
                // MENGAMBIL DATA DARI database.json
                const response = await fetch('/database.json'); // Pastikan database.json ada di root folder (sejajar dengan index.html)
                if (!response.ok) throw new Error('File database.json tidak ditemukan!');
                filesToLoad = await response.json();
                console.log("Berhasil memuat database:", filesToLoad);
            } catch (error) {
                console.warn("Karena dipreview di web browser isolasi, database.json tidak terbaca. Menggunakan data cadangan simulasi.");
                for(let i=0; i<40; i++) filesToLoad.push(i % 5 === 0 ? `video_${i}.mp4` : `foto_${i}.jpg`);
            }

            // PROSES MEMUAT FILE SETELAH DATA JSON DIDAPATKAN
            filesToLoad.forEach((filename, index) => {
                const url = basePath + filename;
                const ext = filename.split('.').pop().toLowerCase();

                if (ext === 'mp4') {
                    const video = document.createElement('video');
                    video.src = url; video.crossOrigin = 'anonymous'; video.loop = true; video.muted = true; video.playsInline = true; video.autoplay = true;
                    video.addEventListener('loadeddata', () => {
                        const videoTexture = new THREE.VideoTexture(video);
                        videoTexture.minFilter = THREE.LinearFilter; videoTexture.magFilter = THREE.LinearFilter;
                        createMediaMesh(videoTexture, index, true);
                    });
                    video.addEventListener('error', () => {
                        textureLoader.load(`https://picsum.photos/id/${index + 100}/300/300`, (fallbackTex) => createMediaMesh(fallbackTex, index, false));
                    });
                    video.play().catch(e => console.warn(e));
                } else {
                    textureLoader.load(
                        url, 
                        (texture) => createMediaMesh(texture, index, false),
                        undefined,
                        (err) => {
                            textureLoader.load(`https://picsum.photos/id/${index + 100}/300/300`, (fallbackTex) => createMediaMesh(fallbackTex, index, false));
                        }
                    );
                }
            });
        }

        // Jalankan Inisialisasi
        initGalaxyFromDatabase();

        // 4. ANIMASI LOOP & RESIZE
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            coreMesh.rotation.y -= 0.001;
            ringMesh.rotation.y -= 0.0005;

            photoOrbits.forEach(p => {
                p.angle -= p.speed; 
                p.mesh.position.x = p.radius * Math.cos(p.angle);
                p.mesh.position.z = p.radius * Math.sin(p.angle);
                p.mesh.quaternion.copy(camera.quaternion); // Efek Billboard (selalu menghadap kamera)
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        
        /* ========================================================================
           AKHIR KODE UNTUK FILE: /assets/js/system.js
           ======================================================================== */
    </script>
</body>
</html>
